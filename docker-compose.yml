version: '3.8'

services:
  backend:
    build: ./backend
    env_file: "./backend/.env"
    ports:
      - "8006:8000"
      - "8678:5678"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: python -m debugpy --listen 0.0.0.0:5678 -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./database:/data/db

